<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Memory • Food</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="wrap">
    <header class="top">
      <div class="title">
       
        <div>
          <h1>Food Memory Game 🍟</h1>
          <div class="hint">Find and match the pairs. Say the words aloud.</div>
        </div>
      </div>

      <div class="actions">
        <button class="btn" id="restartBtn">🔄</button>
      </div>
    </header>

    <main>
      <div class="grid" id="grid" aria-label="Игра мемори"></div>
    </main>

    <div class="win" id="win" hidden>
      <div class="winCard" role="dialog" aria-modal="true">
        <div class="winTitle">🎉 Great!</div>
        <div class="winText"></div>
        <button class="btn big" id="playAgainBtn">Play again</button>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
